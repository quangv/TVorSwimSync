<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }
    .marker {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
    }
    /* Horizontal line */
    .marker::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 2px;
      background: red;
      transform: translateY(-50%);
    }
    /* Vertical line */
    .marker::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 2px;
      background: red;
      transform: translateX(-50%);
    }
    /* Center dot */
    .dot {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      background: red;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
    }
    /* Pulsing ring */
    .ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 24px;
      height: 24px;
      border: 2px solid red;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 1s ease-out infinite;
      z-index: 1;
    }
    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="marker"></div>
  <div class="dot"></div>
  <div class="ring"></div>
  <script>
    const { invoke } = window.__TAURI__.core;
    // Auto-close after 5 seconds
    setTimeout(() => {
      invoke('close_window', { label: 'test_marker' });
    }, 5000);
  </script>
</body>
</html>
