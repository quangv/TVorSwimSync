<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TVorSwimSync</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body class="bg-transparent">
    <div
      id="app"
      data-tauri-drag-region
      class="flex flex-col items-center justify-center w-[120px] h-[120px] cursor-move"
    >
      <div data-tauri-drag-region class="relative flex items-center justify-center">
        <div id="emoji" class="text-[72px] leading-none select-none pointer-events-none">🌊</div>
        <div id="symbol" class="absolute inset-0 flex items-center justify-center text-[18px] font-bold text-black/90 select-none pointer-events-none">--</div>
      </div>
      <div id="perm-banner" style="display:none" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 rounded-2xl z-50 cursor-pointer">
        <div class="text-[36px] leading-none">🔒</div>
        <div class="text-white text-[11px] font-semibold text-center px-2 mt-1">Screen Recording<br/>permission needed</div>
        <div class="text-white/60 text-[9px] mt-1">Click to open Settings</div>
      </div>
    </div>
  </body>
</html>
